<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Neuron AI</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family: Arial, sans-serif;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            overflow:hidden;
            background:#1a001f;
            position:relative;
        }

        .background-logo{
            position:absolute;
            width:700px;
            opacity:0.06;
            z-index:0;
            animation: floatLogo 6s ease-in-out infinite;
        }

        @keyframes floatLogo{
            0%{ transform:translateY(0px); }
            50%{ transform:translateY(-10px); }
            100%{ transform:translateY(0px); }
        }

        .chat-container{
            width:420px;
            height:700px;
            border-radius:25px;
            overflow:hidden;
            background:rgba(255,255,255,0.06);
            backdrop-filter:blur(18px);
            border:1px solid rgba(255,255,255,0.08);
            box-shadow:0 15px 50px rgba(0,0,0,0.5);
            display:flex;
            flex-direction:column;
            position:relative;
            z-index:2;
        }

        .chat-header{
            height:85px;
            display:flex;
            align-items:center;
            padding:15px 20px;
            background:rgba(255,255,255,0.04);
            border-bottom:1px solid rgba(255,255,255,0.08);
        }

        .logo{
            width:55px;
            height:55px;
            border-radius:50%;
            overflow:hidden;
            background:white;
            padding:5px;
            margin-right:15px;
        }

        .logo img{
            width:100%;
            height:100%;
            object-fit:contain;
        }

        .header-text h2{
            color:white;
            font-size:22px;
        }

        .header-text p{
            color:#d1c4e9;
            font-size:13px;
        }

        .chat-body{
            flex:1;
            padding:20px;
            overflow-y:auto;
            display:flex;
            flex-direction:column;
            gap:14px;
        }

        .message{
            max-width:80%;
            padding:14px 16px;
            border-radius:18px;
            font-size:14px;
            line-height:1.5;
            animation:fadeIn 0.25s ease;
            word-wrap:break-word;
        }

        .user-message{
            align-self:flex-end;
            background:linear-gradient(135deg,#7b2ff7,#9d4edd);
            color:white;
            border-bottom-right-radius:5px;
        }

        .bot-message{
            align-self:flex-start;
            background:rgba(255,255,255,0.12);
            color:white;
            border-bottom-left-radius:5px;
            border:1px solid rgba(255,255,255,0.05);
        }

        @keyframes fadeIn{
            from{ opacity:0; transform:translateY(10px); }
            to{ opacity:1; transform:translateY(0); }
        }

        .chat-footer{
            height:75px;
            display:flex;
            align-items:center;
            padding:12px;
            gap:10px;
            background:rgba(255,255,255,0.04);
            border-top:1px solid rgba(255,255,255,0.08);
        }

        .chat-footer input{
            flex:1;
            height:48px;
            border:none;
            outline:none;
            border-radius:30px;
            padding:0 18px;
            background:rgba(255,255,255,0.12);
            color:white;
            font-size:14px;
        }

        .chat-footer input::placeholder{
            color:rgba(255,255,255,0.6);
        }

        .send-btn{
            width:48px;
            height:48px;
            border:none;
            border-radius:50%;
            background:linear-gradient(135deg,#7b2ff7,#00b4ff);
            color:white;
            font-size:18px;
            cursor:pointer;
        }

        .send-btn:hover{
            transform:scale(1.05);
        }
    </style>
</head>

<body>

    <img src="{{ url_for('static', filename='image.png') }}" class="background-logo">

    <div class="chat-container">

        <div class="chat-header">
            <div class="logo">
                <img src="{{ url_for('static', filename='image.png') }}">
            </div>

            <div class="header-text">
                <h2>Neuron AI</h2>
                <p>Powered by NeuroCraft</p>
            </div>
        </div>

        <div class="chat-body" id="chat-body">

            <div class="message bot-message">
                Hello 👋<br>I am Neuron AI. Ask me anything.
            </div>

        </div>

        <form class="chat-footer" id="chat-form">
            <input type="text" id="user-input" placeholder="Ask a question..." autocomplete="off" required>
            <button class="send-btn" type="submit">➤</button>
        </form>

    </div>

    <script>
        const chatForm = document.getElementById("chat-form");
        const userInput = document.getElementById("user-input");
        const chatBody = document.getElementById("chat-body");

        function addMessage(text, className){
            const div = document.createElement("div");
            div.classList.add("message", className);
            div.textContent = text;
            chatBody.appendChild(div);
            chatBody.scrollTop = chatBody.scrollHeight;
        }

        chatForm.addEventListener("submit", async (e) => {
            e.preventDefault();

            const message = userInput.value.trim();
            if(!message) return;

            addMessage(message, "user-message");
            userInput.value = "";

            addMessage("Neuron is thinking...", "bot-message");

            try{
                const response = await fetch("/chat", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/x-www-form-urlencoded"
                    },
                    body: new URLSearchParams({
                        user_input: message
                    })
                });

                const data = await response.json();

                // remove "thinking..."
                chatBody.removeChild(chatBody.lastChild);

                addMessage(data.response, "bot-message");

            } catch(err){
                chatBody.removeChild(chatBody.lastChild);
                addMessage("Error connecting to server.", "bot-message");
            }

            userInput.focus();
        });
    </script>

</body>
</html>
