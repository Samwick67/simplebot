<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Neuron AI</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family: Arial, sans-serif;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            overflow:hidden;
            position:relative;
            background:#1a001f;
        }

        /* BACKGROUND IMAGE */

        .background-logo{
            position:absolute;
            width:700px;
            opacity:0.06;
            z-index:0;
            animation: floatLogo 6s ease-in-out infinite;
        }

        @keyframes floatLogo{
            0%{
                transform:translateY(0px);
            }
            50%{
                transform:translateY(-10px);
            }
            100%{
                transform:translateY(0px);
            }
        }

        /* CHAT CONTAINER */

        .chat-container{
            width:420px;
            height:700px;
            border-radius:25px;
            overflow:hidden;
            background:rgba(255,255,255,0.06);
            backdrop-filter:blur(18px);
            border:1px solid rgba(255,255,255,0.08);
            box-shadow:0 15px 50px rgba(0,0,0,0.5);
            display:flex;
            flex-direction:column;
            position:relative;
            z-index:2;
        }

        /* HEADER */

        .chat-header{
            height:85px;
            display:flex;
            align-items:center;
            padding:15px 20px;
            background:rgba(255,255,255,0.04);
            border-bottom:1px solid rgba(255,255,255,0.08);
        }

        .logo{
            width:55px;
            height:55px;
            border-radius:50%;
            overflow:hidden;
            background:white;
            padding:5px;
            margin-right:15px;
            box-shadow:0 0 15px rgba(255,255,255,0.15);
        }

        .logo img{
            width:100%;
            height:100%;
            object-fit:contain;
        }

        .header-text h2{
            color:white;
            font-size:22px;
            font-weight:bold;
        }

        .header-text p{
            color:#d1c4e9;
            font-size:13px;
            margin-top:3px;
        }

        /* CHAT AREA */

        .chat-body{
            flex:1;
            padding:20px;
            overflow-y:auto;
            display:flex;
            flex-direction:column;
            gap:14px;
        }

        .chat-body::-webkit-scrollbar{
            width:5px;
        }

        .chat-body::-webkit-scrollbar-thumb{
            background:#7b2ff7;
            border-radius:10px;
        }

        /* MESSAGES */

        .message{
            max-width:80%;
            padding:14px 16px;
            border-radius:18px;
            font-size:14px;
            line-height:1.5;
            animation:fadeIn 0.25s ease;
        }

        .user-message{
            align-self:flex-end;
            background:linear-gradient(135deg,#7b2ff7,#9d4edd);
            color:white;
            border-bottom-right-radius:5px;
        }

        .bot-message{
            align-self:flex-start;
            background:rgba(255,255,255,0.12);
            color:white;
            border-bottom-left-radius:5px;
            border:1px solid rgba(255,255,255,0.05);
        }

        @keyframes fadeIn{
            from{
                opacity:0;
                transform:translateY(10px);
            }
            to{
                opacity:1;
                transform:translateY(0px);
            }
        }

        /* FOOTER */

        .chat-footer{
            height:75px;
            display:flex;
            align-items:center;
            padding:12px;
            gap:10px;
            background:rgba(255,255,255,0.04);
            border-top:1px solid rgba(255,255,255,0.08);
        }

        .chat-footer input{
            flex:1;
            height:48px;
            border:none;
            outline:none;
            border-radius:30px;
            padding:0 18px;
            background:rgba(255,255,255,0.12);
            color:white;
            font-size:14px;
        }

        .chat-footer input::placeholder{
            color:rgba(255,255,255,0.6);
        }

        .send-btn{
            width:48px;
            height:48px;
            border:none;
            border-radius:50%;
            background:linear-gradient(135deg,#7b2ff7,#00b4ff);
            color:white;
            font-size:18px;
            cursor:pointer;
            transition:0.2s ease;
        }

        .send-btn:hover{
            transform:scale(1.08);
        }

    </style>
</head>

<body>

    <!-- BACKGROUND IMAGE -->

    <img
        src="{{ url_for('static', filename='image.png') }}"
        class="background-logo"
    >

    <!-- CHAT CONTAINER -->

    <div class="chat-container">

        <!-- HEADER -->

        <div class="chat-header">

            <div class="logo">
                <img src="{{ url_for('static', filename='image.png') }}">
            </div>

            <div class="header-text">
                <h2>Neuron AI</h2>
                <p>Powered by NeuroCraft</p>
            </div>

        </div>

        <!-- CHAT BODY -->

        <div class="chat-body" id="chat-body">

            <div class="message bot-message">
                Hello 👋<br>
                I am Neuron AI. Ask me anything.
            </div>

        </div>

        <!-- FOOTER -->

        <form class="chat-footer" id="chat-form">

            <input
                type="text"
                id="user-input"
                placeholder="Ask a question..."
                autocomplete="off"
                required
            >

            <button type="submit" class="send-btn">
                ➤
            </button>

        </form>

    </div>

    <!-- JAVASCRIPT -->

    <script>

        const chatForm = document.getElementById("chat-form");
        const userInput = document.getElementById("user-input");
        const chatBody = document.getElementById("chat-body");

        chatForm.addEventListener("submit", async function(e){

            e.preventDefault();

            const message = userInput.value.trim();

            if(!message) return;

            // USER MESSAGE

            const userDiv = document.createElement("div");
            userDiv.classList.add("message","user-message");
            userDiv.innerHTML = message;

            chatBody.appendChild(userDiv);

            userInput.value = "";

            chatBody.scrollTop = chatBody.scrollHeight;

            try{

                const response = await fetch("/chat",{
                    method:"POST",
                    headers:{
                        "Content-Type":"application/x-www-form-urlencoded"
                    },
                    body:new URLSearchParams({
                        user_input:message
                    })
                });

                const data = await response.json();

                // BOT MESSAGE

                const botDiv = document.createElement("div");
                botDiv.classList.add("message","bot-message");
                botDiv.innerHTML = data.response;

                chatBody.appendChild(botDiv);

                chatBody.scrollTop = chatBody.scrollHeight;

            }catch(error){

                const errorDiv = document.createElement("div");
                errorDiv.classList.add("message","bot-message");
                errorDiv.innerHTML = "Error connecting to server.";

                chatBody.appendChild(errorDiv);

            }

        });

    </script>

</body>
</html>
